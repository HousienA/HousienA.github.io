name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject EmailJS config
        run: |
          printf 'const EMAILJS_SERVICE_ID  = "%s";\nconst EMAILJS_TEMPLATE_ID = "%s";\nconst EMAILJS_PUBLIC_KEY  = "%s";\n' \
            "${{ secrets.EMAILJS_SERVICE_ID }}" \
            "${{ secrets.EMAILJS_TEMPLATE_ID }}" \
            "${{ secrets.EMAILJS_PUBLIC_KEY }}" > emailjs-config.js

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deployment
